<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JobPortal – Find Your Dream Career</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #07090f;
  --surface: #0f1520;
  --surface2: #161e2e;
  --surface3: #1c2640;
  --border: #1e2d45;
  --border2: #243352;
  --accent: #4f8ef7;
  --accent2: #7c3aed;
  --accent3: #06b6d4;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #e8edf8;
  --text2: #8fa3c7;
  --text3: #4f6a8f;
  --syne: 'Syne', sans-serif;
  --dm: 'DM Sans', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --glow: 0 0 40px rgba(79,142,247,.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--dm); font-size: 15px; line-height: 1.6; min-height: 100vh; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Loader ── */
#root-loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 16px; }
.ring { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Typography ── */
h1,h2,h3,h4,h5 { font-family: var(--syne); font-weight: 700; line-height: 1.2; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: var(--dm); border: none; outline: none; }
input, textarea, select { font-family: var(--dm); outline: none; }

/* ── Layout ── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
.page { min-height: 100vh; padding-top: 80px; }
.section { padding: 80px 0; }

/* ── Navbar ── */
.navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(7,9,15,.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 70px; }
.nav-logo { font-family: var(--syne); font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav-links { display: flex; align-items: center; gap: 8px; }
.nav-link { padding: 8px 16px; border-radius: var(--radius-sm); color: var(--text2); font-size: 14px; font-weight: 500; transition: all .2s; }
.nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }
.nav-actions { display: flex; align-items: center; gap: 10px; }
.notif-btn { position: relative; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .2s; }
.notif-btn:hover { border-color: var(--accent); color: var(--accent); }
.notif-badge { position: absolute; top: -4px; right: -4px; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.avatar-btn { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; overflow: hidden; border: 2px solid var(--border2); transition: border-color .2s; }
.avatar-btn:hover { border-color: var(--accent); }
.avatar-btn img { width: 100%; height: 100%; object-fit: cover; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 22px; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; transition: all .2s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3d7df5; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,142,247,.3); }
.btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.05); }
.btn-danger { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-success { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: var(--success); }
.btn-success:hover { background: var(--success); color: #fff; }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-lg { padding: 14px 32px; font-size: 16px; border-radius: var(--radius); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ── Cards ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: all .25s; }
.card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
.card-elevated { background: var(--surface2); border-color: var(--border2); }

/* ── Forms ── */
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; letter-spacing: .5px; text-transform: uppercase; }
.form-control { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 11px 16px; border-radius: var(--radius-sm); font-size: 14px; transition: all .2s; }
.form-control:focus { border-color: var(--accent); background: var(--surface3); box-shadow: 0 0 0 3px rgba(79,142,247,.12); }
.form-control::placeholder { color: var(--text3); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 100px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-error { font-size: 12px; color: var(--danger); margin-top: 5px; }
.input-icon { position: relative; }
.input-icon .form-control { padding-left: 42px; }
.input-icon .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
.badge-blue   { background: rgba(79,142,247,.15); color: var(--accent); }
.badge-purple { background: rgba(124,58,237,.15); color: #a78bfa; }
.badge-green  { background: rgba(16,185,129,.15); color: var(--success); }
.badge-yellow { background: rgba(245,158,11,.15); color: var(--warning); }
.badge-red    { background: rgba(239,68,68,.15); color: var(--danger); }
.badge-gray   { background: var(--surface2); color: var(--text3); }
.badge-cyan   { background: rgba(6,182,212,.15); color: var(--accent3); }

/* ── Stats ── */
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.stat-card.blue::before  { background: var(--accent); }
.stat-card.purple::before { background: var(--accent2); }
.stat-card.green::before  { background: var(--success); }
.stat-card.yellow::before { background: var(--warning); }
.stat-value { font-family: var(--syne); font-size: 32px; font-weight: 800; color: var(--text); }
.stat-label { font-size: 13px; color: var(--text3); margin-top: 4px; }
.stat-icon { width: 44px; height: 44px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 12px; }
.stat-icon.blue   { background: rgba(79,142,247,.12); }
.stat-icon.purple { background: rgba(124,58,237,.12); }
.stat-icon.green  { background: rgba(16,185,129,.12); }
.stat-icon.yellow { background: rgba(245,158,11,.12); }

/* ── Job Cards ── */
.job-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; cursor: pointer; transition: all .25s; position: relative; overflow: hidden; }
.job-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(79,142,247,.12); }
.job-card.featured::after { content: 'FEATURED'; position: absolute; top: 16px; right: -28px; background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #fff; font-size: 9px; font-weight: 800; padding: 4px 36px; transform: rotate(40deg); letter-spacing: 1px; }
.job-logo { width: 48px; height: 48px; border-radius: 10px; background: var(--surface3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; flex-shrink: 0; }
.job-logo img { width: 100%; height: 100%; object-fit: cover; }
.job-title { font-family: var(--syne); font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.job-company { font-size: 13px; color: var(--text2); }
.job-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.job-tag { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); background: var(--surface2); padding: 4px 10px; border-radius: 6px; }
.job-salary { font-family: var(--syne); font-size: 14px; font-weight: 700; color: var(--success); }

/* ── Hero ── */
.hero { padding: 120px 0 80px; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 800px; height: 800px; background: radial-gradient(ellipse, rgba(79,142,247,.06) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
.hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: rgba(79,142,247,.08); border: 1px solid rgba(79,142,247,.2); color: var(--accent); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 24px; }
.hero-title { font-size: clamp(40px, 5vw, 72px); font-weight: 800; line-height: 1.05; margin-bottom: 24px; }
.hero-title span { background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-sub { font-size: 18px; color: var(--text2); max-width: 580px; margin-bottom: 40px; line-height: 1.7; }
.search-bar { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; max-width: 680px; transition: border-color .2s; }
.search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,.1); }
.search-input { flex: 1; background: transparent; border: none; color: var(--text); padding: 16px 20px; font-size: 15px; }
.search-input::placeholder { color: var(--text3); }
.search-divider { width: 1px; background: var(--border); margin: 12px 0; }
.search-btn { background: var(--accent); color: #fff; padding: 0 28px; font-weight: 700; font-size: 15px; border-radius: 0 var(--radius) var(--radius) 0; transition: background .2s; }
.search-btn:hover { background: #3d7df5; }
.hero-stats { display: flex; gap: 40px; margin-top: 48px; }
.hero-stat { text-align: left; }
.hero-stat-num { font-family: var(--syne); font-size: 28px; font-weight: 800; color: var(--text); }
.hero-stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* ── Category Grid ── */
.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 16px; text-align: center; cursor: pointer; transition: all .2s; }
.cat-card:hover { border-color: var(--accent); background: rgba(79,142,247,.04); transform: translateY(-2px); }
.cat-icon { font-size: 28px; margin-bottom: 10px; }
.cat-name { font-size: 13px; font-weight: 600; color: var(--text); }
.cat-count { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── Filter Sidebar ── */
.filter-sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; position: sticky; top: 90px; }
.filter-title { font-size: 13px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.filter-group { margin-bottom: 24px; }
.filter-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
.filter-option { display: flex; align-items: center; gap: 10px; padding: 7px 0; cursor: pointer; }
.filter-option input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
.filter-option span { font-size: 14px; color: var(--text2); }
.filter-option:hover span { color: var(--text); }

/* ── Pagination ── */
.pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 32px; }
.page-btn { width: 38px; height: 38px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); color: var(--text2); font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: all .2s; cursor: pointer; }
.page-btn:hover, .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn .15s; }
@keyframes fadeIn { from { opacity: 0; } }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: calc(var(--radius) + 4px); padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: slideUp .2s; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.modal-title { font-family: var(--syne); font-size: 20px; font-weight: 700; }
.modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: all .2s; }
.modal-close:hover { border-color: var(--danger); color: var(--danger); }

/* ── Dashboard Layout ── */
.dashboard { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; padding-top: 70px; }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 16px; position: sticky; top: 70px; height: calc(100vh - 70px); overflow-y: auto; }
.sidebar-user { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 24px; border: 1px solid var(--border); }
.sidebar-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; overflow: hidden; flex-shrink: 0; }
.sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sidebar-name { font-weight: 600; font-size: 14px; color: var(--text); }
.sidebar-role { font-size: 11px; color: var(--text3); text-transform: capitalize; margin-top: 2px; }
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
.sidebar-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: var(--radius-sm); color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; border: 1px solid transparent; }
.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active { background: rgba(79,142,247,.1); border-color: rgba(79,142,247,.2); color: var(--accent); }
.sidebar-item .icon { font-size: 17px; width: 20px; text-align: center; }
.sidebar-divider { height: 1px; background: var(--border); margin: 12px 0; }
.dash-content { padding: 32px; overflow-y: auto; }
.dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
.dash-title { font-family: var(--syne); font-size: 26px; font-weight: 800; }

/* ── Tables ── */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table { width: 100%; border-collapse: collapse; }
.table th { background: var(--surface2); color: var(--text3); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); }
.table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); vertical-align: middle; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: rgba(255,255,255,.02); }

/* ── Profile ── */
.profile-header { background: linear-gradient(135deg, var(--surface), var(--surface2)); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; position: relative; overflow: hidden; }
.profile-header::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border: 1px solid var(--border); border-radius: 50%; }
.profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #fff; border: 3px solid var(--border2); overflow: hidden; margin-bottom: 16px; }
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-name { font-family: var(--syne); font-size: 24px; font-weight: 800; }
.profile-sub { color: var(--text2); margin-top: 4px; }
.skill-tag { display: inline-flex; background: rgba(79,142,247,.1); border: 1px solid rgba(79,142,247,.2); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 3px; }

/* ── Notifications Panel ── */
.notif-panel { position: absolute; top: 52px; right: 0; width: 360px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); box-shadow: var(--shadow); z-index: 500; max-height: 480px; display: flex; flex-direction: column; animation: slideUp .15s; }
.notif-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.notif-title { font-family: var(--syne); font-size: 15px; font-weight: 700; }
.notif-list { overflow-y: auto; flex: 1; }
.notif-item { display: flex; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); transition: background .15s; cursor: pointer; }
.notif-item:hover { background: var(--surface2); }
.notif-item.unread { background: rgba(79,142,247,.04); }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }
.notif-msg { font-size: 13px; color: var(--text2); line-height: 1.5; }
.notif-time { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ── Chatbot ── */
.chatbot-trigger { position: fixed; bottom: 28px; right: 28px; z-index: 1500; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(79,142,247,.4); transition: transform .2s; }
.chatbot-trigger:hover { transform: scale(1.08); }
.chatbot-window { position: fixed; bottom: 96px; right: 28px; width: 360px; height: 480px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); box-shadow: var(--shadow); z-index: 1500; display: flex; flex-direction: column; animation: slideUp .2s; }
.chat-head { background: linear-gradient(135deg, var(--accent), var(--accent2)); padding: 16px 20px; border-radius: var(--radius) var(--radius) 0 0; display: flex; align-items: center; justify-content: space-between; }
.chat-head-info { display: flex; align-items: center; gap: 10px; }
.chat-bot-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.chat-bot-name { font-family: var(--syne); font-weight: 700; font-size: 15px; color: #fff; }
.chat-bot-status { font-size: 11px; color: rgba(255,255,255,.7); }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.chat-msg { max-width: 85%; }
.chat-msg.bot { align-self: flex-start; }
.chat-msg.user { align-self: flex-end; }
.chat-bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; line-height: 1.6; white-space: pre-line; }
.chat-bubble.bot { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
.chat-bubble.user { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.chat-input-area { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
.chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 14px; border-radius: var(--radius-sm); font-size: 13px; }

.chat-send:hover { background: #3d7df5; }

/* ── Application Status ── */
.status-timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-step { display: flex; align-items: flex-start; gap: 16px; padding-bottom: 24px; position: relative; }
.timeline-step:last-child { padding-bottom: 0; }
.timeline-step:last-child .tl-line { display: none; }
.tl-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; border: 2px solid; }
.tl-line { position: absolute; left: 13px; top: 32px; bottom: 0; width: 2px; background: var(--border); }
.tl-content { flex: 1; }
.tl-label { font-weight: 600; font-size: 14px; }
.tl-time { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── Charts ── */
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
.chart-title { font-family: var(--syne); font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text); }

/* ── Auth Pages ── */
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: var(--bg); position: relative; overflow: hidden; }
.auth-page::before { content: ''; position: absolute; top: -300px; left: -300px; width: 700px; height: 700px; background: radial-gradient(ellipse, rgba(79,142,247,.05) 0%, transparent 70%); border-radius: 50%; }
.auth-page::after  { content: ''; position: absolute; bottom: -300px; right: -300px; width: 700px; height: 700px; background: radial-gradient(ellipse, rgba(124,58,237,.05) 0%, transparent 70%); border-radius: 50%; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: calc(var(--radius) + 6px); padding: 40px; width: 100%; max-width: 460px; position: relative; z-index: 1; }
.auth-logo { font-family: var(--syne); font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.auth-tagline { font-size: 14px; color: var(--text3); margin-bottom: 32px; }

.divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }

.role-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }

/* ── OTP ── */

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
const formatSalary = (sal) => {
  if (!sal || !sal.min) return 'Not disclosed';
  const fmt = (n) => n >= 100000 ? `${(n/100000).toFixed(1)}L` : n >= 1000 ? `${(n/1000).toFixed(0)}K` : n;
  return `₹${fmt(sal.min)} – ₹${fmt(sal.max)} / ${sal.period || 'yr'}`;
};
const timeAgo = (date) => {
  const d = new Date(date), now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
};
const getInitials = (name) => name ? name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() : '?';
const statusColor = (s) => ({applied:'blue',viewed:'gray',shortlisted:'green',interview:'yellow',rejected:'red',hired:'purple',active:'green',closed:'red',draft:'gray'}[s]||'gray');
const typeLabel = (t) => ({full_time:'Full-time','full-time':'Full-time','part-time':'Part-time',contract:'Contract',internship:'Internship',remote:'Remote',freelance:'Freelance'}[t]||t);
const showToast = (msg, type='success') => {
  const t = document.createElement('div');
  const colors = {success:'var(--success)',error:'var(--danger)',info:'var(--accent)'};
  t.style.cssText = `position:fixed;top:20px;right:20px;z-index:9999;background:var(--surface);border:1px solid ${colors[type]||colors.info};color:var(--text);padding:14px 20px;border-radius:10px;font-size:14px;box-shadow:var(--shadow);max-width:340px;animation:slideUp .2s;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
};

// ═══════════════════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════════════════
const loadAuth = () => {
  const u = localStorage.getItem('jp_user');
  const t = localStorage.getItem('jp_token');
  if (u && t) { State.user = JSON.parse(u); State.token = t; }
};

const doLogin = (user, token) => {
  State.user = user; State.token = token;
  localStorage.setItem('jp_user', JSON.stringify(user));
  localStorage.setItem('jp_token', token);
  State.notifications = MOCK_NOTIFICATIONS;
  State.unreadCount = MOCK_NOTIFICATIONS.filter(n=>!n.isRead).length;
};

const doLogout = () => {
  State.user = null; State.token = null;
  localStorage.removeItem('jp_user'); localStorage.removeItem('jp_token');
  navigate('home');
  showToast('Logged out successfully');
};

// ═══════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════
const PAGES = ['home','jobs','job-detail','login','register','otp','forgot','dashboard','profile','admin'];

const navigate = (page, params={}) => {
  if (page === 'dashboard' && !State.token) { navigate('login'); return; }
  if (page === 'admin' && State.user?.role !== 'admin') { navigate('dashboard'); return; }

  PAGES.forEach(p => {
    const el = document.getElementById(`page-${p}`);
    if (el) el.style.display = 'none';
  });

  State.currentPage = page;
  Object.assign(State, params);

  const el = document.getElementById(`page-${page}`);
  if (el) el.style.display = 'block';

  window.scrollTo(0,0);
  renderPage(page);
  renderNav();
};

const renderPage = (page) => {
  const el = document.getElementById(`page-${page}`);
  if (!el) return;
  const renders = {
    home: renderHome, jobs: renderJobs, 'job-detail': renderJobDetail,
    login: renderLogin, register: renderRegister, otp: renderOTP,
    forgot: renderForgot, dashboard: renderDashboard,
    profile: renderProfile, admin: renderAdmin
  };
  if (renders[page]) { el.innerHTML = renders[page](); bindPageEvents(page); }
};

// ═══════════════════════════════════════════════════════════════════════════
// NAV RENDER
// ═══════════════════════════════════════════════════════════════════════════
const renderNav = () => {
  const actions = document.getElementById('nav-actions');
  const dashLink = document.getElementById('nav-dashboard');
  if (!actions) return;

  if (State.token && dashLink) dashLink.style.display = '';
  else if (dashLink) dashLink.style.display = 'none';

  if (State.token) {
    actions.innerHTML = `
      <div class="relative" style="position:relative">
        <button class="notif-btn" onclick="toggleNotif()" id="notif-btn">🔔
          ${State.unreadCount > 0 ? `<span class="notif-badge">${State.unreadCount}</span>` : ''}
        </button>
        <div id="notif-dropdown" style="display:none">
          ${renderNotifPanel()}
        </div>
      </div>
      <button class="avatar-btn" onclick="navigate('profile')" title="${State.user.name}">
        ${getInitials(State.user.name)}
      </button>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button>
    `;
  } else {
    actions.innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="navigate('login')">Sign In</button>
      <button class="btn btn-primary btn-sm" onclick="navigate('register')">Get Started</button>
    `;
  }
};

const toggleNotif = () => {
  const d = document.getElementById('notif-dropdown');
  if (!d) return;
  State.notifOpen = !State.notifOpen;
  d.style.display = State.notifOpen ? 'block' : 'none';
  if (State.notifOpen) { State.unreadCount = 0; renderNav(); }
};

const renderNotifPanel = () => `
  <div class="notif-panel">
    <div class="notif-head">
      <span class="notif-title">Notifications</span>
      <button class="btn btn-ghost btn-sm" onclick="State.notifications.forEach(n=>n.isRead=true);toggleNotif()">Mark all read</button>
    </div>
    <div class="notif-list">
      ${State.notifications.length === 0
        ? `<div class="empty-state" style="padding:30px"><div class="empty-icon">🔔</div><p class="empty-sub">No notifications yet</p></div>`

const renderJobs = () => {
  const jobs = getFilteredJobs();

    <div class="jobs-layout">
      <!-- Filters -->
      <div class="filter-sidebar">
        <div class="filter-title">Filters</div>

          <div class="filter-label">Job Type</div>
          ${['full-time','part-time','contract','internship','remote'].map(t=>`
            <label class="filter-option">
              <input type="checkbox" ${State.jobsFilters.type===t?'checked':''} onchange="setFilter('type','${t}',this.checked)" />
              <span>${typeLabel(t)}</span>
            </label>`).join('')}
        </div>
        <div class="filter-group">
          <div class="filter-label">Experience</div>
          ${['fresher','1-2 years','2-5 years','5-10 years'].map(e=>`
            <label class="filter-option">
              <input type="checkbox" ${State.jobsFilters.experience===e?'checked':''} onchange="setFilter('experience','${e}',this.checked)" />
              <span>${e}</span>
            </label>`).join('')}
        </div>
        <div class="filter-group">
          <div class="filter-label">Category</div>
          ${['technology','design','marketing','finance','operations'].map(c=>`
            <label class="filter-option">
              <input type="checkbox" ${State.jobsFilters.category===c?'checked':''} onchange="setFilter('category','${c}',this.checked)" />
              <span style="text-transform:capitalize">${c}</span>
            </label>`).join('')}
        </div>
        <div class="filter-group">
          <div class="filter-label">Location</div>
          ${['Bengaluru','Hyderabad','Mumbai','Pune','Delhi'].map(l=>`
            <label class="filter-option">
              <input type="checkbox" ${State.jobsFilters.location===l?'checked':''} onchange="setFilter('location','${l}',this.checked)" />
              <span>${l}</span>
            </label>`).join('')}
        </div>
        <button class="btn btn-secondary w-full btn-sm" onclick="clearFilters()">Clear All Filters</button>
      </div>

      <!-- Job List -->
      <div>
        ${jobs.length === 0
          ? `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No jobs found</div><div class="empty-sub">Try adjusting your search filters</div></div>`
          : `<div class="jobs-list">${jobs.map(renderJobListItem).join('')}</div>
             ${renderPagination(jobs.length)}`}
      </div>
    </div>
  </div>
</div>`;
};

const getFilteredJobs = () => {
  let jobs = [...MOCK_JOBS];
  const f = State.jobsFilters;
  if (f.keyword) jobs = jobs.filter(j => j.title.toLowerCase().includes(f.keyword.toLowerCase()) || j.company.name.toLowerCase().includes(f.keyword.toLowerCase()));
  if (f.type) jobs = jobs.filter(j => j.type === f.type);
  if (f.experience) jobs = jobs.filter(j => j.experience === f.experience);
  if (f.category) jobs = jobs.filter(j => j.category === f.category.toLowerCase());
  if (f.location) jobs = jobs.filter(j => j.location.city === f.location);
  return jobs;
};

const setFilter = (key, val, checked) => {
  State.jobsFilters[key] = checked ? val : undefined;
  renderPage('jobs');
};
const clearFilters = () => { State.jobsFilters = {}; renderPage('jobs'); };
let searchTimer;
const debounceSearch = (v) => { clearTimeout(searchTimer); searchTimer = setTimeout(()=>{ State.jobsFilters.keyword = v; renderPage('jobs'); }, 300); };

const renderPagination = (total) => {
  const pages = Math.ceil(total / 5);
  if (pages <= 1) return '';
  return `<div class="pagination">
    <button class="page-btn" ${State.jobsPage<=1?'disabled':''} onclick="setPage(${State.jobsPage-1})">‹</button>
    ${Array.from({length:Math.min(pages,5)},(_,i)=>`<button class="page-btn ${i+1===State.jobsPage?'active':''}" onclick="setPage(${i+1})">${i+1}</button>`).join('')}
    <button class="page-btn" ${State.jobsPage>=pages?'disabled':''} onclick="setPage(${State.jobsPage+1})">›</button>
  </div>`;
};
const setPage = (p) => { State.jobsPage = p; renderPage('jobs'); window.scrollTo(0,0); };

const otpMove = (el, idx) => {
  if (el.value.length === 1) {
    const inputs = document.querySelectorAll('.otp-digit');
    if (idx < 5) inputs[idx+1]?.focus();
  }
};
const otpBack = (e, el, idx) => {
  if (e.key==='Backspace' && !el.value) {
    const inputs = document.querySelectorAll('.otp-digit');
    if (idx > 0) inputs[idx-1]?.focus();
  }
};
const verifyOTP = () => {
  const inputs = document.querySelectorAll('.otp-digit');
  const otp = Array.from(inputs).map(i=>i.value).join('');
  if (otp.length < 6) { showToast('Enter all 6 digits','error'); return; }
  const pd = State.pendingUserData || {};
  const user = { _id:'new-'+Date.now(), name:pd.name||'New User', email:pd.email||'user@example.com', role:pd.role||'jobseeker', isVerified:true, skills:[], experience:'fresher' };
  doLogin_(user);
};

// CHATBOT
// ═══════════════════════════════════════════════════════════════════════════
const renderChatbot = () => {
  if (!State.token) return;
  const container = document.getElementById('chatbot-container');
  if (!container) return;

  const messagesHTML = State.chatMessages.length === 0
    ? `<div class="chat-msg bot"><div class="chat-bubble bot">👋 Hi! I'm <strong>JobBot</strong>, your AI career assistant! I can help with resumes, interviews, salary negotiation, and more. What would you like help with?</div></div>`
    : State.chatMessages.map(m=>`
        <div class="chat-msg ${m.from}">
          <div class="chat-bubble ${m.from}">${m.text}</div>
        </div>`).join('');

  container.innerHTML = `
    <button class="chatbot-trigger" onclick="toggleChat()" title="AI Career Assistant">
      ${State.chatOpen ? '✕' : '🤖'}
    </button>
    ${State.chatOpen ? `
    <div class="chatbot-window">
      <div class="chat-head">
        <div class="chat-head-info">
          <div class="chat-bot-avatar">🤖</div>
          <div><div class="chat-bot-name">JobBot</div><div class="chat-bot-status">● AI Career Assistant</div></div>
        </div>
        <button style="background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px" onclick="toggleChat()">✕</button>
      </div>
      <div class="chat-messages" id="chat-messages">${messagesHTML}</div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="Ask about jobs, resume, interviews..." onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="chat-send" onclick="sendChat()">➤</button>
      </div>
    </div>` : ''}`;

  if (State.chatOpen) {
    const msgs = document.getElementById('chat-messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }
};

const toggleChat = () => {
  State.chatOpen = !State.chatOpen;
  renderChatbot();
};

const sendChat = () => {
  const input = document.getElementById('chat-input');
  const msg = input?.value?.trim();
  if (!msg) return;
  State.chatMessages.push({ from:'user', text:msg });
  if (input) input.value = '';
  renderChatbot();

  // Simulate bot response
  setTimeout(() => {
    const response = getBotResponse(msg);
    State.chatMessages.push({ from:'bot', text:response });
    renderChatbot();
  }, 600);
};

const getBotResponse = (msg) => {
  const m = msg.toLowerCase();
  if (m.includes('resume') || m.includes('cv')) return '📄 **Resume Tips:**\n• Keep it 1-2 pages\n• Use action verbs (Led, Built, Improved)\n• Tailor to each job description\n• Include measurable achievements\n• Add relevant keywords';
  if (m.includes('interview')) return '🎯 **Interview Tips:**\n• Research the company thoroughly\n• Practice the STAR method\n• Prepare 5 questions to ask\n• Dress professionally\n• Send a thank-you email after';
  if (m.includes('salary') || m.includes('negotiate')) return '💰 **Salary Negotiation:**\n• Research market rates first\n• Don\'t reveal current salary\n• Negotiate after receiving an offer\n• Consider the full package\n• Be confident but polite';
  if (m.includes('skills') || m.includes('learn')) return '🚀 **In-Demand Skills 2025:**\n• Tech: Python, Cloud, AI/ML, React\n• Data: SQL, Tableau, Power BI\n• Soft: Communication, Leadership\n• Platforms: Coursera, Udemy';
  if (m.includes('hi') || m.includes('hello')) return '👋 Hello! Great to meet you! I\'m here to help with your career journey. Ask me about resumes, interviews, job search strategies, or salary tips!';
  return '🤖 I can help you with:\n• **Resume** writing tips\n• **Interview** preparation\n• **Salary** negotiation\n• **Skills** to learn\n• **Job search** strategies\n\nWhat topic would you like help with?';
};

// ═══════════════════════════════════════════════════════════════════════════
// CHARTS (Chart.js)
// ═══════════════════════════════════════════════════════════════════════════
const CHART_COLORS = { blue:'rgba(79,142,247', purple:'rgba(124,58,237', green:'rgba(16,185,129', yellow:'rgba(245,158,11', red:'rgba(239,68,68', cyan:'rgba(6,182,212' };
const cc = (color, alpha=1) => `${CHART_COLORS[color]||CHART_COLORS.blue},${alpha})`;
const chartDefaults = { color:'#8fa3c7', borderColor:'#1e2d45', backgroundColor:'#0f1520' };

const initCharts = () => {
  Chart.defaults.color = chartDefaults.color;
  Chart.defaults.borderColor = chartDefaults.borderColor;

  tryChart('status-chart', 'doughnut',
    { labels:['Applied','Viewed','Shortlisted','Interview','Rejected'], datasets:[{ data:[2,1,1,0,1], backgroundColor:[cc('blue',.8),cc('cyan',.8),cc('green',.8),cc('yellow',.8),cc('red',.8)], borderWidth:0, hoverOffset:6 }] },
    { plugins:{ legend:{ position:'bottom', labels:{ padding:16, usePointStyle:true } } }, cutout:'65%' }
  );

  tryChart('activity-chart', 'bar',
    { labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets:[{ label:'Applications', data:[2,1,3,1,2,0,1], backgroundColor:cc('accent'||'blue',.7), borderRadius:6, borderSkipped:false }] },
    { plugins:{legend:{display:false}}, scales:{ y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{precision:0}}, x:{grid:{display:false}} } }
  );

  tryChart('recruiter-chart', 'bar',
    { labels:['React Dev','Node.js Eng','UI Designer','Data Sci'], datasets:[{ label:'Applicants', data:[24,18,31,12], backgroundColor:[cc('blue',.8),cc('purple',.8),cc('green',.8),cc('cyan',.8)], borderRadius:8, borderSkipped:false }] },
    { plugins:{legend:{display:false}}, scales:{ y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{precision:0}}, x:{grid:{display:false}} } }
  );

  tryChart('pipeline-chart', 'doughnut',
    { labels:['Applied','Viewed','Shortlisted','Interview','Hired'], datasets:[{ data:[45,22,8,3,2], backgroundColor:[cc('blue',.8),cc('cyan',.8),cc('green',.8),cc('yellow',.8),cc('purple',.8)], borderWidth:0 }] },
    { plugins:{ legend:{ position:'bottom', labels:{ padding:14, usePointStyle:true } } }, cutout:'60%' }
  );

  tryChart('user-growth-chart', 'line',
    { labels:['Nov','Dec','Jan','Feb','Mar','Apr'], datasets:[{ label:'New Users', data:[280,350,420,390,510,620], borderColor:cc('blue',1), backgroundColor:cc('blue',.08), fill:true, tension:.4, pointBackgroundColor:cc('blue',1), pointRadius:4 }] },
    { plugins:{legend:{display:false}}, scales:{ y:{grid:{color:'rgba(255,255,255,.04)'}}, x:{grid:{display:false}} } }
  );

  tryChart('job-trend-chart', 'line',
    { labels:['Nov','Dec','Jan','Feb','Mar','Apr'], datasets:[{ label:'Jobs Posted', data:[140,195,230,210,280,340], borderColor:cc('purple',1), backgroundColor:cc('purple',.08), fill:true, tension:.4, pointBackgroundColor:cc('purple',1), pointRadius:4 }] },
    { plugins:{legend:{display:false}}, scales:{ y:{grid:{color:'rgba(255,255,255,.04)'}}, x:{grid:{display:false}} } }
  );

  tryChart('monthly-reg-chart', 'bar',
    { labels:['Nov','Dec','Jan','Feb','Mar','Apr'], datasets:[
        { label:'Job Seekers', data:[180,230,280,250,320,380], backgroundColor:cc('blue',.8), borderRadius:6, borderSkipped:false },
        { label:'Recruiters',  data:[40,55,60,50,70,90], backgroundColor:cc('purple',.8), borderRadius:6, borderSkipped:false }
      ] },
    { plugins:{ legend:{ position:'bottom' } }, scales:{ x:{stacked:false,grid:{display:false}}, y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{precision:0}} } }
  );

  tryChart('cat-chart', 'doughnut',
    { labels:CATEGORIES.map(c=>c.name), datasets:[{ data:CATEGORIES.map(c=>c.count), backgroundColor:['#4f8ef7','#7c3aed','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899'].map(c=>c+'cc'), borderWidth:0 }] },
    { plugins:{ legend:{ position:'right', labels:{ padding:12, usePointStyle:true, font:{size:12} } } }, cutout:'50%' }
  );

  tryChart('app-breakdown-chart', 'bar',
    { labels:['Applied','Viewed','Shortlisted','Interview','Hired','Rejected'], datasets:[{ label:'Applications', data:[45280,28340,8420,3280,1240,12560], backgroundColor:[cc('blue',.8),cc('cyan',.8),cc('green',.8),cc('yellow',.8),cc('purple',.8),cc('red',.8)], borderRadius:6, borderSkipped:false }] },
    { plugins:{legend:{display:false}}, scales:{ y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{callback:v=>v>=1000?`${(v/1000).toFixed(0)}K`:v}}, x:{grid:{display:false}} } }
  );
};

const tryChart = (id, type, data, options={}) => {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  try {
    new Chart(canvas, { type, data, options:{ ...options, responsive:true, maintainAspectRatio:false } });
  } catch(e) { console.warn('Chart error:', e.message); }
};

const bindPageEvents = (page) => {
  setTimeout(() => {
    if (page === 'dashboard') { initCharts(); renderChatbot(); }
    if (page === 'home') { /* hero animations */ }
  }, 100);
};

const bindDashTabEvents = (tab) => {
  setTimeout(() => { initCharts(); }, 100);
};

const showEditProfileModal = () => {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><div class="modal-title">Edit Profile</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" value="${State.user?.name||''}" id="edit-name" /></div>
        <div class="form-group"><label class="form-label">Location</label><input class="form-control" value="${State.user?.location||''}" id="edit-location" placeholder="City, State" /></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-control" value="${State.user?.phone||''}" id="edit-phone" placeholder="+91 98765 43210" /></div>
        <div class="form-group"><label class="form-label">Bio</label><textarea class="form-control" id="edit-bio" rows="3" placeholder="Tell recruiters about yourself...">${State.user?.bio||''}</textarea></div>
        <div class="form-group"><label class="form-label">Skills (comma separated)</label><input class="form-control" value="${(State.user?.skills||[]).join(', ')}" id="edit-skills" /></div>
        <div class="form-group"><label class="form-label">Experience Level</label>
          <select class="form-control" id="edit-exp">
            ${['fresher','1-2 years','2-5 years','5-10 years','10+ years'].map(e=>`<option ${State.user?.experience===e?'selected':''}>${e}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-primary w-full" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>`;
};

const saveProfile = () => {
  const updates = {
    name: document.getElementById('edit-name')?.value,
    location: document.getElementById('edit-location')?.value,
    phone: document.getElementById('edit-phone')?.value,
    bio: document.getElementById('edit-bio')?.value,
    skills: document.getElementById('edit-skills')?.value.split(',').map(s=>s.trim()).filter(Boolean),
    experience: document.getElementById('edit-exp')?.value,
  };
  Object.assign(State.user, updates);
  localStorage.setItem('jp_user', JSON.stringify(State.user));
  closeModal();
  showToast('Profile updated successfully! ✓');
  setDashTab('profile');
};

// INIT
// ═══════════════════════════════════════════════════════════════════════════
const init = () => {
  // Load saved auth
  loadAuth();
  if (State.token) {
    State.applications = MOCK_APPLICATIONS;
    State.myJobs = MOCK_RECRUITER_JOBS;
    State.notifications = MOCK_NOTIFICATIONS;
    State.unreadCount = 2;
  }

  // Hide loader, show app
  setTimeout(() => {
    document.getElementById('root-loader').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }, 800);

  // Render initial page
  navigate('home');
};

// Close notif on outside click
document.addEventListener('click', (e) => {
  const notif = document.getElementById('notif-dropdown');
  const btn = document.getElementById('notif-btn');
  if (notif && btn && !btn.contains(e.target) && !notif.contains(e.target)) {
    notif.style.display = 'none';
    State.notifOpen = false;
  }
});

// OTP Timer
const startOtpTimer = () => {
  let seconds = 600;
  const interval = setInterval(() => {
    const el = document.getElementById('otp-timer');
    if (!el) { clearInterval(interval); return; }
    seconds--;
    const m = Math.floor(seconds/60).toString().padStart(2,'0');
    const s = (seconds%60).toString().padStart(2,'0');
    el.textContent = `${m}:${s}`;
    if (seconds <= 0) { clearInterval(interval); el.textContent = 'Expired'; el.style.color='var(--danger)'; }
  }, 1000);
};

// Start
init();
</script>
